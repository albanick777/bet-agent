<script>
const API_KEY = "70af1e6d704b7fcaa8d60aa590281b03";

    headers:{"x-apisports-key":"70af1e6d704b7fcaa8d60aa590281b03"}
  });

  const data = await res.json();
  let html = "";
  let bestMatch = null;

  data.response.forEach(m=>{

    if(total >= 3){

      confidence = 85;
    }

    if(Math.random() > 0.7){
      prediction = "BTTS";
      confidence = 83;
    }

    if(!bestMatch || confidence > bestMatch.confidence){
      bestMatch = {
        text: `${m.teams.home.name} vs ${m.teams.away.name}`,
        prediction,
        confidence
      };
